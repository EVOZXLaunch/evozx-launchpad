<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVOZX LAUNCHPAD - Premium Web3 Token Deployer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/umd/ethers.umd.min.js"></script>
    
    <style>
        body {
            background-color: #0B0E14;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .neon-blue-glow {
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .neon-gold-glow {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div id="root" class="w-full max-w-md"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Form Konfigurasi Utama Proyek EVOZX
        function App() {
            const [formData, setFormData] = useState({
                name: '',
                symbol: '',
                supply: '',
                burnable: false,
                mintable: false
            });
            const [status, setStatus] = useState('Idle');
            const [account, setAccount] = useState('');

            const EVOZ_CHAIN_ID = 805;
            const FACTORY_ADDRESS = '0xbA40773bCF0d30e83c4319796Ec45CA31d6e64bB';

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : value
                }));
            };

            const connectWallet = async () => {
                if (!window.ethereum) {
                    alert('Web3 Wallet not detected! Please open via MetaMask or dApp Browser.');
                    return;
                }
                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    setAccount(accounts[0]);
                } catch (err) {
                    console.error(err);
                }
            };

            const handleDeploy = async (e) => {
                e.preventDefault();
                setStatus('Validating Web3 Network...');

                if (!window.ethereum) {
                    alert("Wallet error. Execute from a compatible Web3 browser!");
                    setStatus('Idle');
                    return;
                }

                try {
                    const provider = new ethers.BrowserProvider(window.ethereum);
                    const network = await provider.getNetwork();

                    if (Number(network.chainId) !== EVOZ_CHAIN_ID) {
                        alert("Wrong Network! Please switch to EVOZ Mainnet (Chain ID: 805)");
                        setStatus('Idle');
                        return;
                    }

                    const signer = await provider.getSigner();
                    setStatus('Awaiting Factory contract execution...');
                    
                    // Alur Integrasi Smart Contract Utama (Factory Minting)
                    // Integrasi dilakukan di sini dengan ABI target Anda.
                    
                    setTimeout(() => {
                        setStatus('Token Contract Initialized Successfully (Simulation)');
                    }, 2500);

                } catch (error) {
                    console.error(error);
                    setStatus('Transaction Rejected / Failed');
                }
            };

            return (
                <div class="bg-[#131A26] border border-gray-800 rounded-2xl p-8 neon-blue-glow transition-all duration-500">
                    <div class="text-center mb-8">
                        <h1 class="text-3xl font-extrabold tracking-wide text-[#D4AF37] drop-shadow-md">EVOZX LAUNCHPAD</h1>
                        <p class="text-xs text-gray-400 mt-1 uppercase tracking-widest">Premium Token Creator SaaS</p>
                    </div>

                    {account ? (
                        <div class="bg-[#0B0E14] text-xs text-center text-green-400 border border-green-900/30 py-2 px-3 rounded-lg mb-6 truncate">
                            Connected: {account}
                        </div>
                    ) : (
                        <button onClick={connectWallet} class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-500 hover:to-indigo-600 font-bold py-2 px-4 rounded-lg mb-6 text-sm tracking-wide transition-all duration-300">
                            Connect Web3 Wallet
                        </button>
                    )}

                    <form onSubmit={handleDeploy} class="space-y-5">
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Token Name</label>
                            <input type="text" name="name" onChange={handleInputChange} required class="w-full bg-[#0B0E14] border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="e.g. Luxury Asset Token" />
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Token Symbol</label>
                            <input type="text" name="symbol" onChange={handleInputChange} required class="w-full bg-[#0B0E14] border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="e.g. LAT" />
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total Supply</label>
                            <input type="number" name="supply" onChange={handleInputChange} required class="w-full bg-[#0B0E14] border border-gray-700 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-blue-500 transition-colors" placeholder="e.g. 100000000" />
                        </div>

                        <div class="flex gap-6 py-2 border-t border-b border-gray-800/60">
                            <label class="flex items-center space-x-3 text-sm text-gray-300 cursor-pointer select-none">
                                <input type="checkbox" name="burnable" onChange={handleInputChange} class="w-4 h-4 rounded accent-blue-500 bg-gray-900 border-gray-700" />
                                <span>Burnable</span>
                            </label>
                            <label class="flex items-center space-x-3 text-sm text-gray-300 cursor-pointer select-none">
                                <input type="checkbox" name="mintable" onChange={handleInputChange} class="w-4 h-4 rounded accent-blue-500 bg-gray-900 border-gray-700" />
                                <span>Mintable</span>
                            </label>
                        </div>

                        <button type="submit" class="w-full bg-[#2563EB] hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl text-sm tracking-wide shadow-lg hover:shadow-blue-500/20 transition-all duration-300 transform active:scale-95">
                            DEPLOY ON EVOZ NETWORK
                        </button>
                    </form>

                    {status !== 'Idle' && (
                        <div class="mt-6 text-center text-xs font-semibold text-[#D4AF37] bg-[#0B0E14] border border-yellow-600/20 py-3 px-4 rounded-xl animate-pulse">
                            {status}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
